<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inverted Comma — Loading</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #3D5A3E;
      --cream: #FBF9F6;
      --ink: #2c2c2a;
      --font-sans: "Helvetica Neue", Arial, "Inter", ui-sans-serif, system-ui, sans-serif;
      --font-serif: "Georgia", Garamond, serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background-color: var(--cream);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 600px;
      padding: 48px 32px;
      text-align: center;
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }

    .logo {
      height: 38px;
      width: auto;
      margin: 0 auto 64px;
      display: block;
    }

    .quote-box {
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .quote-text {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 23px;
      line-height: 1.6;
      color: var(--ink);
      letter-spacing: -0.2px;
      margin-bottom: 20px;
      transition: opacity 0.5s ease;
    }

    .quote-attribution {
      font-size: 12px;
      color: #9a968d;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 500;
      transition: opacity 0.5s ease;
    }

    .quote-fading { opacity: 0; }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      margin-top: 56px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #E5E1D9;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 11px;
      color: #b3afa5;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .fade-out { opacity: 0; transform: translateY(-8px); }

    @media (max-width: 480px) {
      .quote-text { font-size: 20px; }
      .logo { height: 32px; margin-bottom: 48px; }
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <img src="/logo.svg" alt="Inverted Comma" class="logo">

    <div class="quote-box">
      <div class="quote-text" id="quoteText"></div>
      <div class="quote-attribution" id="quoteAttr"></div>
    </div>

    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Gathering thoughts&hellip;</div>
    </div>
  </div>

  <script>
    const quotes = [
      { text: "Adopt the pace of nature: her secret is patience.", author: "Ralph Waldo Emerson" },
      { text: "Patience is bitter, but its fruit is sweet.", author: "Jean-Jacques Rousseau" },
      { text: "A moment of patience may ward off great disaster. A moment of impatience may ruin a whole life.", author: "Chinese Proverb" },
      { text: "Slow is smooth, smooth is fast.", author: "SAS Maxim" },
      { text: "The greatest power is often simple patience.", author: "E. Joseph Cossman" },
      { text: "Beware the barrenness of a busy life.", author: "Socrates" },
      { text: "Everything comes to those who wait.", author: "Traditional Proverb" }
    ];

    // Start on a random quote so repeat cold-starts don't always show the same one.
    let idx = Math.floor(Math.random() * quotes.length);
    const textEl = document.getElementById("quoteText");
    const attrEl = document.getElementById("quoteAttr");

    function render(i) {
      const q = quotes[i % quotes.length];
      textEl.textContent = "“" + q.text + "”";
      attrEl.textContent = "— " + q.author;
    }
    render(idx);

    // Cross-fade to the next quote every 5s.
    setInterval(() => {
      textEl.classList.add("quote-fading");
      attrEl.classList.add("quote-fading");
      setTimeout(() => {
        idx++;
        render(idx);
        textEl.classList.remove("quote-fading");
        attrEl.classList.remove("quote-fading");
      }, 500);
    }, 5000);

    // Poll the server; once it's awake, fade out and enter the app.
    async function checkReady() {
      try {
        const res = await fetch("/api/health", { cache: "no-store" });
        if (res.ok) {
          document.getElementById("container").classList.add("fade-out");
          setTimeout(() => { window.location.href = "/"; }, 800);
          return true;
        }
      } catch (e) { /* not ready yet */ }
      return false;
    }

    const poll = setInterval(async () => {
      if (await checkReady()) clearInterval(poll);
    }, 2000);

    // Safety net: never trap the visitor — give up after 90s and try the app anyway.
    setTimeout(() => { clearInterval(poll); window.location.href = "/"; }, 90000);
  </script>
</body>
</html>
