<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inverted Comma — Loading</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #f5f5f0 0%, #fafaf8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #3a3a38;
    }

    .container {
      max-width: 600px;
      padding: 40px 30px;
      text-align: center;
    }

    .logo {
      margin-bottom: 50px;
      opacity: 0.95;
    }

    .logo svg {
      width: 120px;
      height: 120px;
      display: block;
      margin: 0 auto;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #3D5A3E;
      margin-top: 12px;
    }

    .quote-box {
      margin: 60px 0 50px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .quote-text {
      font-size: 20px;
      line-height: 1.6;
      color: #2c2c2a;
      font-style: italic;
      margin-bottom: 16px;
      opacity: 0.95;
      letter-spacing: -0.3px;
    }

    .quote-text::before {
      content: '"';
      font-size: 32px;
      color: #3D5A3E;
      opacity: 0.3;
      margin-right: 4px;
    }

    .quote-attribution {
      font-size: 13px;
      color: #888;
      font-style: normal;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 40px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #e0e0dc;
      border-top-color: #3D5A3E;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 13px;
      color: #999;
      letter-spacing: 0.5px;
    }

    .fade-out {
      animation: fadeOut 0.8s ease-out forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: translateY(-10px);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <!-- Logo as SVG (monogram IC) -->
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
        <circle cx="100" cy="100" r="95" stroke="#3D5A3E" stroke-width="2"/>
        <text x="100" y="120" font-size="72" font-weight="700" text-anchor="middle" fill="#3D5A3E" font-family="Georgia, serif">IC</text>
      </svg>
      <div class="logo-text">Inverted Comma</div>
    </div>

    <div class="quote-box">
      <div class="quote-text" id="quoteText"></div>
      <div class="quote-attribution" id="quoteAttr"></div>
    </div>

    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Loading thoughtful quotes…</div>
    </div>
  </div>

  <script>
    const quotes = [
      {
        text: "Adopt the pace of nature: her secret is patience.",
        author: "Ralph Waldo Emerson",
        source: "Walking (1862)"
      },
      {
        text: "Patience is bitter, but its fruit is sweet.",
        author: "Jean-Jacques Rousseau",
        source: "18th century"
      },
      {
        text: "A moment of patience may ward off great disaster. A moment of impatience may ruin a whole life.",
        author: "Chinese Proverb",
        source: "Ancient wisdom"
      },
      {
        text: "Slow is smooth, smooth is fast.",
        author: "SAS Military Maxim",
        source: "Special Air Service doctrine"
      },
      {
        text: "The greatest power is often simple patience.",
        author: "E. Joseph Cossman",
        source: "20th century"
      },
      {
        text: "Beware the barrenness of a busy life.",
        author: "Socrates",
        source: "Classical philosophy"
      },
      {
        text: "Everything comes to those who wait.",
        author: "Traditional Proverb",
        source: "19th century"
      }
    ];

    let currentQuoteIdx = 0;

    function displayQuote(idx) {
      const q = quotes[idx % quotes.length];
      document.getElementById("quoteText").textContent = q.text;
      document.getElementById("quoteAttr").textContent = `— ${q.author}`;
    }

    function rotateQuote() {
      currentQuoteIdx++;
      displayQuote(currentQuoteIdx);
    }

    // Display the first quote immediately
    displayQuote(0);

    // Rotate quotes every 5 seconds
    setInterval(rotateQuote, 5000);

    // Poll the server to detect when it's ready
    async function checkServerReady() {
      try {
        const res = await fetch("/api/health", { method: "GET" });
        if (res.ok) {
          // Server is ready — fade out the splash and redirect
          document.querySelector(".container").classList.add("fade-out");
          setTimeout(() => {
            window.location.href = "/";
          }, 800);
          return true;
        }
      } catch (e) {
        // Server not ready yet, keep polling
      }
      return false;
    }

    // Check every 2 seconds if the server is ready
    const healthCheckInterval = setInterval(async () => {
      if (await checkServerReady()) {
        clearInterval(healthCheckInterval);
      }
    }, 2000);

    // Fallback: if server doesn't respond after 90 seconds, force redirect
    setTimeout(() => {
      clearInterval(healthCheckInterval);
      window.location.href = "/";
    }, 90000);
  </script>
</body>
</html>
