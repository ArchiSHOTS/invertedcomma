# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploys the Inverted Comma Express API + bundled React frontend as one web service.
services:
  - type: web
    name: invertedcomma
    runtime: node
    region: singapore          # closest to Neon Singapore DB → lowest latency
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false            # set manually in dashboard (secret)
      - key: JWT_SECRET
        generateValue: true    # Render generates a strong random value
      - key: GEMINI_API_KEY
        sync: false            # set manually in dashboard (secret)

# Keep-alive: Render no longer offers a free Cron Job tier. Instead, an external
# free scheduler (cron-job.org) pings /api/health every 10 minutes so this free
# web service never hits Render's ~15min idle spin-down. Set up at cron-job.org —
# no Render-side config needed.
