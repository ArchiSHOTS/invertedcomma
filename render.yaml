# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploys the Inverted Comma Express API + bundled React frontend as one web service.
services:
  - type: web
    name: invertedcomma
    runtime: node
    region: singapore          # closest to Neon Singapore DB → lowest latency
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false            # set manually in dashboard (secret)
      - key: JWT_SECRET
        generateValue: true    # Render generates a strong random value
      - key: GEMINI_API_KEY
        sync: false            # set manually in dashboard (secret)

  # Pings the live API every 10 minutes so the free web service never hits
  # Render's ~15min idle spin-down — keeps cold starts (and splash.html) rare.
  - type: cron
    name: invertedcomma-keepalive
    runtime: node
    region: singapore
    plan: free
    schedule: "*/10 * * * *"
    buildCommand: "true"
    startCommand: "curl -sf https://www.invertedcomma.com/api/health || true"
